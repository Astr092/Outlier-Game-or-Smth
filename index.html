<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Outlier</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <main class="container">

        <h1>OUTLIER</h1>
        <p class="subtitle">
            One player is different.<br>
            Can you figure out who?
        </p>

        <!-- ==========================
             HOME SCREEN
        =========================== -->

        <section id="homeScreen">

            <input
                type="text"
                id="nameInput"
                placeholder="Enter your name"
                maxlength="20"
            >

            <button id="createLobbyBtn">
                Create Lobby
            </button>

            <div class="divider">
                <span>OR</span>
            </div>

            <input
                type="text"
                id="roomInput"
                placeholder="Lobby Code"
                maxlength="5"
            >

            <button id="joinLobbyBtn">
                Join Lobby
            </button>

        </section>

        <!-- ==========================
             LOBBY
        =========================== -->

        <section id="lobbyScreen" class="hidden">

            <h2>
                Lobby
            </h2>

            <div class="lobbyCode">

                <span id="roomCodeDisplay">
                    -----
                </span>

                <button id="copyCodeBtn">
                    Copy Code
                </button>

            </div>

            <p id="hostLabel"></p>

            <h3>
                Players
            </h3>

            <ul id="playerList">

            </ul>

            <p id="playerCount">
                0 Players
            </p>

            <button
                id="startGameBtn"
                class="hidden">
                Start Game
            </button>

            <button
                id="leaveLobbyBtn">
                Leave Lobby
            </button>

            <p id="statusText">
                Waiting for players...
            </p>

        </section>

        <!-- ==========================
             GAME SCREEN
        =========================== -->

        <section id="gameScreen" class="hidden">

            <h2>
                Game Started
            </h2>

            <button id="revealRoleBtn">

                Reveal My Role

            </button>

            <div
                id="roleCard"
                class="hidden">

                <h2 id="roleTitle"></h2>

                <p id="roleDescription"></p>

            </div>

            <button
                id="playAgainBtn"
                class="hidden">

                Play Again

            </button>

        </section>

        <!-- ==========================
             FOOTER
        =========================== -->

        <footer>

            <small>

                Outlier

            </small>

        </footer>

    </main>

    <script type="module" src="script.js"></script>

</body>

</html>
