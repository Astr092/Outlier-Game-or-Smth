<!DOCTYPE html>
<html>
<head>
    <title>Outlier Game</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
    <h1>Outlier</h1>

<div id="join">

    <input id="name" placeholder="Your name">

    <button onclick="createLobby()">
        Create Lobby
    </button>

    <hr>

    <input id="room" placeholder="Enter lobby code">

    <button onclick="joinGame()">
        Join Lobby
    </button>

</div>

    <div id="game" hidden>
<h2>
Lobby:
<span id="roomDisplay"></span>
</h2>

<button onclick="copyLobbyCode()">
Copy Lobby Code
</button>

        <h3>Players:</h3>
        <ul id="players"></ul>

        <button onclick="startGame()">Start Game</button>

        <button onclick="revealRole()">Reveal My Role</button>

        <h2 id="result"></h2>
    </div>
    
</html>
<button onclick="copyLink()">
Copy Game Link
</button>

    </div>

<script type="module" src="script.js"></script>
    
    </body>
